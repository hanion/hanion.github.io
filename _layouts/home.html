---
layout: default
home: true
---

<h3 class="posts-item-note" aria-label="Recent Posts"></h3>
{%- for post in site.posts limit: site.number_of_posts -%}
<article class="post-item">
  <a href="{{ post.url }}">
    <div class="post-item-image-box">
      <img class="post-item-image" src="{{ post.image }}">
    </div>
  </a>
  
  <div>
    <h4 class="post-item-title">
      <a href="{{ post.url }}">{{ post.title | escape }}</a>
    </h4>
    
    <span class="post-item-desc">{{ post.description }}</span>
    
    <span class="post-item-date">{{ post.date | date: "%Y %B %d" }}</span>
  </div>
</article>
{%- endfor -%}
